spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

jwt:
  secret: ${JWT_SECRET}
  access-token-exp-seconds: ${JWT_ACCESS_EXP}
  refresh-token-exp-seconds: ${JWT_REFRESH_EXP}

file:
  upload:
    path: ${user.home}/community/uploads/

scheduler:
  sync:
    fixed-delay: ${SCHEDULER_TIME}

redis:
  view-count:
    key-pattern: ${REDIS_KEY}
    ttl-days: ${REDIS_TTL_DAYS}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}