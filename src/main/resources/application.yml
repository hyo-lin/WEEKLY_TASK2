spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  access-token-exp-seconds: ${JWT_ACCESS_EXP}
  refresh-token-exp-seconds: ${JWT_REFRESH_EXP}

file:
  upload-dir: ${SYSTEM_UPLOAD_DIR}
  url-path: ${SYSTEM_UPLOAD_PATH}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}