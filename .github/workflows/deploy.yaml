name: Deploy BE

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'deploy.sh'
      - '.github/workflows/deploy.yaml'

permissions:
  contents: read
  id-token: write

concurrency:
  group: be-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_URI: ${{ vars.ECR_URI }}
  ECR_REPO: ${{ vars.ECR_REPO }}

jobs:
  # 1. CI 단계: 소스코드를 이미지로 빌드해서 ECR에 push
  continuous-integration:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    # 테스트 실행 중에만 쓸 임시 MySQL 컨테이너
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: community_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=10s

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      # Gradle 테스트 실행을 위한 JDK 설정
      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: 'gradle'

      # CI 핵심: 빌드 및 푸시 전에 단위/통합 테스트 검증
      - name: Run Gradle Test
        run: |
          chmod +x ./gradlew
          ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test

      # OIDC 기반 AWS 임시 권한 획득 (장기 Access Key 제거)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ env.ECR_URI }}

      - name: Build and push image
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ env.ECR_URI }}/${{ env.ECR_REPO }}:${{ steps.vars.outputs.image_tag }} \
            --push .

  # 2. CD 단계: 최신 배포 파일 반영 + BE-a 컨테이너 레벨 Blue-Green 배포
  continuous-deployment:
    name: Continuous Deployment (CD)
    needs: continuous-integration
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # sudo -u ssm-user -i 를 통해 폴더의 실제 소유주 신분으로 안전하게 명령어를 실행합니다.
      - name: git pull latest code on BE-a
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.BE_A_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters commands='[
              "sudo -u ssm-user -i bash -c \"cd /home/ssm-user/WEEKLY_TASK2 && git stash && git pull origin main\""
            ]' \
            --region ${{ env.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BE_A_INSTANCE_ID }}" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BE_A_INSTANCE_ID }}" \
            --query "Status" \
            --output text)

          echo "BE-a git pull 결과: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi

      - name: Run deploy.sh on BE-a (container-level Blue-Green)
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.BE_A_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters commands='[
              "sudo -u ssm-user -i bash -c \"cd /home/ssm-user/WEEKLY_TASK2 && bash -x ./deploy.sh '"${{ env.ECR_URI }}"' '"${{ needs.continuous-integration.outputs.image_tag }}"' '"${{ secrets.TG_ARN }}"' '"${{ secrets.BE_A_INSTANCE_ID }}"'\""
            ]' \
            --region ${{ env.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BE_A_INSTANCE_ID }}" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BE_A_INSTANCE_ID }}" \
            --query "Status" \
            --output text)

          echo "BE-a 배포 결과: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi