name: Deploy BE

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'deploy.sh'
      - '.github/workflows/deploy.yaml'

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_URI: ${{ vars.ECR_URI }}
  ECR_REPO: ${{ vars.ECR_REPO }}

jobs:
  # 1. CI 단계: 소스코드를 이미지로 빌드해서 ECR에 push
  continuous-integration:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Set image tag
        id: vars
        run: echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ env.ECR_URI }}

      - name: Build and push image
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ env.ECR_URI }}/${{ env.ECR_REPO }}:${{ steps.vars.outputs.image_tag }} \
            --push .

  # 2. CD 단계: 최신 배포 파일 반영 + BE-c → BE-a 순으로 Blue-Green 배포
  continuous-deployment:
    name: Continuous Deployment (CD)
    needs: continuous-integration
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 서버에 이미 clone돼있는 리포지토리에서 최신 코드(docker-compose.yml, deploy.sh 포함)를
      # git pull로 받아옴. safe.directory 등록은 SSM 실행 주체와 폴더 소유자가 다르게 인식되는 문제 대응
      - name: git pull latest code on BE-a & BE-c
        run: |
          for INSTANCE_ID in ${{ secrets.BE_A_INSTANCE_ID }} ${{ secrets.BE_C_INSTANCE_ID }}; do
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters commands='[
                "git config --global --add safe.directory /home/ssm-user/WEEKLY_TASK2",
                "cd /home/ssm-user/WEEKLY_TASK2",
                "git pull origin main",
                "chmod +x deploy.sh"
              ]' \
              --region ${{ env.AWS_REGION }} \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || true

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)

            echo "$INSTANCE_ID git pull 결과: $STATUS"
            if [ "$STATUS" != "Success" ]; then
              exit 1
            fi
          done


      # BE-c를 먼저 배포. BE-a는 아직 살아있으니 이 동안에도 서비스는 계속됨.
      - name: Run deploy.sh on BE-c (container-level Blue-Green)
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.BE_C_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "cd /home/ssm-user/WEEKLY_TASK2",
              "./deploy.sh '${{ env.ECR_URI }}' '${{ needs.continuous-integration.outputs.image_tag }}' '${{ secrets.TG_ARN }}' '${{ secrets.BE_C_INSTANCE_ID }}'"
            ]' \
            --region ${{ env.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BE_C_INSTANCE_ID }}" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BE_C_INSTANCE_ID }}" \
            --query "Status" \
            --output text)

          echo "BE-c 배포 결과: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi

      # BE-c 배포가 성공했을 때만 BE-a 배포 진행
      - name: Run deploy.sh on BE-a (container-level Blue-Green)
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.BE_A_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "cd /home/ssm-user/WEEKLY_TASK2",
              "./deploy.sh '${{ env.ECR_URI }}' '${{ needs.continuous-integration.outputs.image_tag }}' '${{ secrets.TG_ARN }}' '${{ secrets.BE_A_INSTANCE_ID }}'"
            ]' \
            --region ${{ env.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BE_A_INSTANCE_ID }}" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BE_A_INSTANCE_ID }}" \
            --query "Status" \
            --output text)

          echo "BE-a 배포 결과: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi